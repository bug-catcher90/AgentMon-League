# Railway: use root Dockerfile for this service (Next.js app).
# Second service (emulator) must be added in the dashboard with Dockerfile path: emulator/Dockerfile
# See docs/RAILWAY.md for full setup (Neon, variables, domain).
#
# If you see "Dockerfile does not exist": in the app service Settings → Build,
# set Root Directory to empty (repo root). Do not set a subdirectory.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
